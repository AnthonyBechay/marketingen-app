# ─────────────────────────────────────────────────────────────────
# Production / Coolify deploy.
#
# Assumes:
#   - Postgres lives elsewhere (your Hetzner server). Pass DATABASE_URL.
#   - The `coolify` network exists (Coolify creates it).
#   - Coolify's reverse proxy handles port mapping (no `ports:` here).
#
# Set these env vars in the Coolify UI:
#   DATABASE_URL, ANTHROPIC_API_KEY, R2_ACCOUNT_ID, R2_ACCESS_KEY_ID,
#   R2_SECRET_ACCESS_KEY, R2_BUCKET, R2_PUBLIC_URL
#   (Optional) ANTHROPIC_MODEL — defaults to claude-sonnet-4-5.
#
# For local dev with a containerized Postgres, use docker-compose.dev.yml.
# ─────────────────────────────────────────────────────────────────
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: '${DATABASE_URL}'
      ANTHROPIC_API_KEY: '${ANTHROPIC_API_KEY}'
      ANTHROPIC_MODEL: '${ANTHROPIC_MODEL:-claude-sonnet-4-5}'
      R2_ACCOUNT_ID: '${R2_ACCOUNT_ID}'
      R2_ACCESS_KEY_ID: '${R2_ACCESS_KEY_ID}'
      R2_SECRET_ACCESS_KEY: '${R2_SECRET_ACCESS_KEY}'
      R2_BUCKET: '${R2_BUCKET}'
      R2_PUBLIC_URL: '${R2_PUBLIC_URL}'
    networks:
      - coolify
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    # Run pending migrations, then start the standalone Next.js server.
    # Invoke prisma by path (not via .bin/prisma) — Docker COPY dereferences
    # that symlink and breaks the wasm lookup in the runtime image.
    command:
      - sh
      - '-c'
      - "node node_modules/prisma/build/index.js migrate deploy && node server.js"

networks:
  coolify:
    external: true
